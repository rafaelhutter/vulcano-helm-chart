## Vulcano Helm Chart Values
## Complete application deployment with MongoDB, RabbitMQ, and optional CSI driver

# -- Global configuration for the Vulcano deployment
global:
  # -- Kubernetes namespace for the deployment
  namespace: "vulcano-app"
  # -- Domain name for ingress and services
  domain: "vulcano.example.com"

# -- Docker Image Configuration
images:
  vulcano:
    # -- Docker repository for Vulcano application
    repository: "moovit/vulcano"
    # -- Docker image tag
    tag: "1.9.13"
    # -- Image pull policy
    pullPolicy: "IfNotPresent"

# -- Image Pull Secrets configuration
imagePullSecrets:
  # -- Enable image pull secrets
  enabled: true
  secrets:
    - name: docker-io

# Vulcano Backend Service Configuration
vulcano:
  enabled: true
  replicaCount: 1

  service:
    # -- Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    # -- Service port
    port: 8889
    # -- Target port
    targetPort: 8889

  ingress:
    # -- Enable ingress
    enabled: true
    # -- Ingress class name
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-body-size: "500m"
      nginx.ingress.kubernetes.io/server-snippets: |
        location /ws {
         proxy_set_header Upgrade $http_upgrade;
         proxy_http_version 1.1;
         proxy_set_header X-Forwarded-Host $http_host;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_set_header X-Forwarded-For $remote_addr;
         proxy_set_header Host $host;
         proxy_set_header Connection "upgrade";
         proxy_cache_bypass $http_upgrade;
        }
    # -- Ingress host
    host: "vulcano.example.com"
    path: "/"
    # -- Enable TLS
    tls:
      enabled: false
      # Certificate source: "letsencrypt" or "existing"
      source: "letsencrypt" # Options: letsencrypt, existing
      # For Let's Encrypt (when source=letsencrypt)
      letsencrypt:
        enabled: false
        clusterIssuer: "letsencrypt-prod" # or letsencrypt-staging
        email: "admin@example.com"
      # For existing certificate (when source=existing)
      existing:
        secretName: "tls-vulcano-cert"

  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "2Gi"

  # Health checks
  livenessProbe:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # Storage configuration
  storage:
    mountPath: "/data"
    # -- Name of the PVC that is created by the chart (used when existingClaim is empty)
    pvc: "smb-vulcano-data"
    size: "10Gi"
    # -- Storage class for the PVC (leave empty for cluster default, set to "-" to omit storageClassName entirely)
    storageClass: "longhorn"
    # -- Access mode for the PVC
    accessModes: ReadWriteOnce
    # -- Additional labels for the PVC
    labels: {}
    # -- Annotations for the PVC.
    # Example: set helm.sh/resource-policy: keep to prevent deletion on helm uninstall
    annotations: {}
    #   helm.sh/resource-policy: keep
    # -- Name of an existing PVC to mount instead of creating a new one.
    # When set, no PVC is created by the chart. Useful for custom CSI storage classes or pre-provisioned PV/PVCs.
    # The PVC/PV itself can be deployed via extraObjects.
    existingClaim: ""

  # Application configuration
  # -- Custom subtitle text displayed in the web interface header
  subtitle: ""
  # -- Enable download functionality for rendered assets in the web interface
  allowDownload: "true"
  # -- Allow creation of assets with duplicate names
  allowDuplicates: "true"
  # -- Enable line breaks in text properties by default when creating new assets
  allowLinebreaksByDefault: "false"
  autologout:
    # -- Completely disable automatic logout functionality
    disable: "false"
    # -- Number of hours of inactivity before users are automatically logged out
    hours: "1"
  # -- Enable support for custom SSL certificates
  customCertificates: "/etc/certs"
  # -- HTTP endpoint URL that receives completed asset data and can MODIFY it before final storage
  completedAssetInterceptor: ""
  # -- HTTP webhook URL for NOTIFICATION purposes only - receives completed asset data but cannot modify it
  completedWebhook: ""
  # -- HTTP endpoint URL that will be called when a new asset is created
  createAssetInterceptor: ""
  folder:
    # -- Enable creation of user-specific folders for organizing generated assets
    createUserFolder: "false"
    # -- Global parent folder path component inserted in generated asset folder structure when user folders are enabled
    globalParent: ""
  frontend:
    # -- If enabled, a Timecode input will appear in the PreferenceView for assets
    enableTimecodeForAssets: "false"
  home:
    base: "/home"
  # -- Maximum number of template properties that can be used in auto-generated asset names
  maxPropertiesInNames: "5"
  # -- Maximum character length for individual property values used in asset names
  maxPropertyLength: "10"
  media:
    dockerHighresPath: ""
  output:
    # -- Template pattern for PatternBasedOutputNameGenerator using placeholder syntax
    namePattern: ""
  panel:
    # -- Require authentication for the Adobe Premiere Pro panel
    loginRequired: "true"
  projects:
    # -- Sorting criteria for project lists in searchProjects API
    sortBy: "NAME"
  # -- Automatically load and display projects when the main page is opened
  searchProjectOnPageOpen: "true"
  # -- Controls whether the frontend displays all bins in the project structure or only those with content
  showAllBins: "false"
  # -- Allow users to specify custom filenames when creating assets instead of using auto-generated names
  useCustomFileName: "false"
  webconfig:
    # -- Disable the web-based configuration interface
    disable: "false"

  # -- JWT license key for application licensing
  license:
    key: ""

# -- MongoDB Configuration
mongodb:
  # -- Enable MongoDB deployment as part of this release.
  # Set to false when using an external MongoDB (e.g. deployed in vulcano-common).
  enabled: true
  # -- External MongoDB host. When set (and enabled=false), Vulcano connects to this host.
  # Credentials from auth.rootUser / auth.rootPassword (or auth.existingSecret) are still used.
  # Example: "mongodb-headless.vulcano-common.svc.cluster.local"
  externalHost: ""
  # -- Full name override for MongoDB resources
  fullnameOverride: "mongodb"
  # -- MongoDB architecture (standalone or replicaset)
  architecture: "replicaset"
  # -- Number of MongoDB replicas
  replicaCount: 3

  auth:
    # -- MongoDB root username
    rootUser: "root"
    # -- MongoDB root password (ignored when existingSecret is set)
    rootPassword: "bitte"
    # -- Name of an existing Kubernetes Secret containing MongoDB credentials.
    # When set, rootPassword is ignored and the chart will NOT create a mongodb-credentials secret.
    existingSecret: ""
    # -- Key inside existingSecret that holds the root password
    existingPasswordKey: "mongodb-root-password"
    # -- Key inside existingSecret that holds the username (defaults to plain username from rootUser)
    existingUsernameKey: ""

  persistence:
    # -- Enable MongoDB persistence
    enabled: true
    # -- MongoDB persistent volume size
    size: "20Gi"
    # -- Storage class name for MongoDB
    storageClassName: ""
    # -- Resource policy for persistent volumes
    resourcePolicy: "keep"

  metrics:
    enabled: false

# -- RabbitMQ Configuration
rabbitmq:
  # -- Enable RabbitMQ deployment as part of this release.
  # Set to false when using an external RabbitMQ (e.g. deployed in vulcano-common).
  enabled: true
  # -- External RabbitMQ host. When set (and enabled=false), Vulcano connects to this host.
  # Credentials from auth.username / auth.password (or auth.existingSecret) are still used.
  # Example: "rabbitmq.vulcano-common.svc.cluster.local"
  externalHost: ""
  # -- Full name override for RabbitMQ resources
  fullnameOverride: "rabbitmq"
  # -- Number of RabbitMQ replicas
  replicaCount: 3

  auth:
    # -- Erlang cookie for RabbitMQ clustering (ignored when existingSecret is set)
    erlangCookie: "VULCANO_SECRET_COOKIE"
    # -- RabbitMQ admin username
    username: "vulcano"
    # -- RabbitMQ admin password (ignored when existingSecret is set)
    password: "vulcano0479"
    # -- Name of an existing Kubernetes Secret containing RabbitMQ credentials.
    # When set, password and erlangCookie are ignored and the chart will NOT create a rabbitmq-credentials secret.
    existingSecret: ""
    # -- Key inside existingSecret that holds the RabbitMQ password
    existingPasswordKey: "rabbitmq-password"
    # -- Key inside existingSecret that holds the Erlang cookie
    existingErlangCookieKey: "rabbitmq-erlang-cookie"

  service:
    # -- RabbitMQ service type (ClusterIP, NodePort, LoadBalancer)
    type: NodePort

  persistence:
    # -- Enable RabbitMQ persistence
    enabled: false

  metrics:
    # -- Enable RabbitMQ metrics
    enabled: false

  # -- Queue name for job updates
  jobUpdateQueue: "vulcano-job-updates"

# RBAC Configuration
rbac:
  create: true

# Service Account
serviceAccount:
  create: true
  name: vulcano
  annotations: {}

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Pod Security Policy
podSecurityPolicy:
  enabled: false

# SMB CSI Driver Configuration (Optional)
smbCsi:
  enabled: false
  username: "username"
  password: "password"
  uri: "//xxx.xxx.xxx.xxx/mountpoint"

# Logging Configuration
logging:
  # -- Path to the log file where application logs are written
  fileName: "/data/LOGS/vulcano_k8s.log"
  # -- Maximum size of the log file before it gets rotated
  fileMaxSize: "10MB"
  level:
    # -- Logging level for the org package
    org: "INFO"
    # -- Logging level for the security filter
    securityFilter: "WARN"

# Management/Metrics Configuration
management:
  endpoints:
    web:
      exposure:
        # -- Comma-separated list of actuator endpoints to expose via web
        include: "health,beans,loggers,env,prometheus,metrics"
  endpoint:
    caches:
      # -- Enable the caches actuator endpoint
      enabled: "true"
    prometheus:
      # -- Enable the Prometheus actuator endpoint
      enabled: "true"
    health:
      # -- When to show full health details in the health endpoint response
      showDetails: "always"
      group:
        readiness:
          # -- Components to include in the readiness health check
          include: "rabbit,diskSpace,mongo,ping"
  prometheus:
    metrics:
      export:
        enabled: "true"
  metrics:
    tags:
      application: "vulcano-backend"
    distribution:
      percentilesHistogram: "true"
      slo: "50ms, 100ms, 200ms, 300ms, 500ms, 1s"
    enable:
      all: "true"
  health:
    livenessstate:
      # -- Enable the liveness state health indicator
      enabled: "true"
      # -- Show detailed information in liveness state health checks
      showDetails: "always"
    readinessstate:
      # -- Enable the readiness state health indicator
      enabled: "true"
      # -- Show detailed information in readiness state health checks
      showDetails: "always"

# Spring Framework Configuration
spring:
  mvc:
    pathmatch:
      matchingStrategy: "ANT_PATH_MATCHER"
  jackson:
    mapper:
      acceptCaseInsensitiveEnums: "true"
    defaultPropertyInclusion: "NON_NULL"
  jpa:
    hibernate:
      ddlAuto: "update"
      naming:
        physicalStrategy: "org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl"
  main:
    lazyInitialization: "false"
  threads:
    virtual:
      enabled: "false"
  servlet:
    multipart:
      enabled: "true"

# SpringDoc Configuration
springdoc:
  swaggerUi:
    path: "/doc"

# Vulcano Folder Configuration
folders:
  # -- Path mapping configuration for render nodes in distributed rendering setups
  pathMapRenderNode: "Z:"
  # -- Server-side path mapping configuration for shared storage access
  pathMapServer: "/data"
  # -- Enable support for custom SSL certificates
  customCertificates: "/etc/certs"
  # -- Root directory path containing all After Effects templates and project files
  templates: "/data/templates"
  media:
    # -- Root directory path where generated high-resolution media files are stored
    folder: "/data/highres"
    # -- Comma-separated list of allowed media file extensions for processing
    extension: ".mov"
    # -- Comma-separated list of allowed media file extensions for processing
    mediaExtension: ".mov"
    # -- Client-side path mapping for media files in path replacement operations
    clientFolder: "/data/highres"
    # -- Directory path containing After Effects project templates and MOGRT files
    templatesFolder: "/data/highres_templates"
  output:
    # -- Folder path where deleted high-resolution rendered files are moved before permanent deletion
    deletedFolder: "/highres_deleted"
    # -- Folder path where deleted high-resolution rendered files are moved before permanent deletion
    deletedhires: "/highres_deleted"
  # -- Directory path where low-resolution proxy files are stored
  proxy: "/data/lowres"
  # -- Directory path where thumbnail images are stored
  thumbnails: "/data/thumbs"
  # -- Client-side path mapping for template files
  templatesClient: ""

# Vulcano Scanner Configuration
folderScanner:
  # -- Enable Delta Tre sports data integration
  startD3: "false"
  # -- Enable automatic file system monitoring to detect changes in template folders
  startWatcher: "true"
  # -- Maximum folder depth level for recursive scanning operations
  maxDepth: "10"
  # -- Allow creation and preservation of empty folders in the file system structure
  allowEmptyFolder: "true"
  # -- Automatically re-render missing high-resolution files when detected during system checks
  recreateMissingHighres: "true"
  # -- Default folder name used for organizing templates and assets when no specific bin is specified
  defaultBin: "Templates"

# Additional Scanner Configuration
folderscanner:
  mediaFolder:
    # -- Recreate the folder structure for media folders
    recreateFolderStructure: "true"
    templates:
      # -- Client-side path mapping for template media files. Used to replace server template paths with client-accessible paths in HiresApiDelegateImpl.mapHiresPath() for template folder access
      client: "/Volumes/helmut_1/vulcano/highres_templates"

# Vulcano Integration Configuration
integrations:
  # -- Authentication token for Helmut4 media asset management system integration
  helmut:
    # -- Authentication token for Helmut4 media asset management system integration
    apiToken: ""
    # -- Base URL of the Helmut4 server API (e.g., https://helmut.company.com/api)
    baseUrl: ""
    # -- OAuth client identifier for Helmut4 API authentication
    clientId: ""
    # -- OAuth client secret for secure Helmut4 API authentication
    clientSecret: ""
    # -- Base breadcrumb path for Helmut4 Cosmo workspace navigation
    cosmoBaseBreadcrumb: ""
    # -- Destination path mapping for Helmut4 Cosmo integration
    cosmoMappingDest: ""
    # -- Source path mapping for Helmut4 Cosmo integration
    cosmoMappingSrc: ""
    # -- Enable synchronization between Vulcano assets and Helmut4 Cosmo workspace
    cosmoSync: "false"
    # -- Enable detailed logging of HTTP requests made to Helmut4 API
    logRequest: "false"
    # -- Number of items per page when fetching data from Helmut4 API
    pageSize: "50"
  # -- URL endpoint for looking up BID information in the NDR VDB system
  ndr:
    # -- URL endpoint for looking up BID (Broadcast ID) information in the NDR VDB system
    bidLookupUrl: ""
    # -- Password for authenticating with the NDR VDB system
    vdbPassword: ""
    # -- Server hostname or URL for the NDR VDB system
    vdbServer: ""
    # -- Enable simulation mode for VDB operations without making actual network calls
    vdbSimulate: "false"
    # -- Username for authenticating with the NDR VDB system
    vdbUsername: ""
    # -- URL to the NDR VDB documentation wiki
    wikiUrl: ""
    # -- Wildcard BID pattern used for broadcast ID matching in the NDR VDB system
    wildcardBid: ""
  # -- API endpoint URL for Octopus newsroom system integration
  octopus:
    # -- API endpoint URL for Octopus newsroom system integration
    api: ""
    # -- Delay in milliseconds between Octopus client polling requests
    clientDelayInMs: "5000"
    # -- Password for authenticating with the Octopus newsroom system
    password: ""
    # -- Enable the Octopus client for receiving and processing MOS messages
    startClient: "false"
    # -- Username for authenticating with the Octopus newsroom system
    username: ""
  # -- Base URL for Vidispine media asset management system API
  vidispine:
    # -- Base URL for Vidispine media asset management system API
    baseUrl: ""
    # -- Authentication endpoint URL for Vidispine system
    baseUrlAuth: ""
    # -- OAuth client identifier for Vidispine API authentication
    clientId: ""
    # -- OAuth client secret for secure Vidispine API authentication
    clientSecret: ""
    # -- Default location value to be pre-selected in the location selector
    defaultLocation: ""
    # -- URL for retrieving allowed values for the Location metadata field from Vidispine
    locationValuesUrl: ""
    # -- Vidispine storage identifier for file operations
    storage: ""
    # -- Default workflow identifier in Vidispine for processing uploaded assets
    workflow: ""
    # -- Specific workflow identifier for MOGRT files in Vidispine
    workflowMogrt: ""
    # -- Version number of the default Vidispine workflow to use
    workflowVersion: ""
    # -- Version number of the MOGRT-specific workflow in Vidispine
    workflowVersionMogrt: ""

# Vulcano Feature Configuration
features:
  # -- Ignore MOGRT files during template scanning and processing
  ignoreMogrt: "false"
  # -- Maximum character limit for asset names and file names
  maxNameLength: "200"
  # -- Enable detailed logging of all HTTP requests made to external APIs
  logThirdPartyRequests: "false"
  # -- Enable After Effects rendering functionality
  afxRender: "true"
  # -- Enable creation of MOGRT files during rendering
  afxCreateMogrt: "true"
  # -- Enable preview rendering functionality in AfxRenderer
  afxRenderPreview: "true"
  # -- Maximum number of assets that can be rendered simultaneously in mass rendering operations
  afxRenderMassJobLimit: "-1"
  # -- Enable on-demand rendering capabilities
  afxRenderOnDemand: "false"
  # -- If enabled, users can both add an asset to a project and mark it as 'Preparing'
  afxRenderOnDemandExtended: "false"
  # -- Enable cloud-based rendering mode
  cloudmode: "false"

# Housekeeping Configuration
housekeeping:
  # -- Enable automatic cleanup and maintenance tasks
  enabled: "false"
  # -- Maximum age in days for housekeeping items before they are automatically cleaned up
  maxAge: "14"

# Helmut Configuration
helmut:
  # -- Enable Helmut4 media asset management system integration
  enabled: false
  # -- Base URL of the Helmut4 server API (e.g., https://helmut.company.com/api)
  baseUrl:
  # -- Enable detailed logging of HTTP requests made to Helmut4 API
  logRequest: "false"
  # -- Authentication token for Helmut4 media asset management system integration
  apiToken: ""
  # -- OAuth client identifier for Helmut4 API authentication
  clientId: ""
  # -- OAuth client secret for secure Helmut4 API authentication
  clientSecret: ""
  # -- Number of items per page when fetching data from Helmut4 API
  pageSize: "50"
  cosmo:
    # -- Base breadcrumb path for Helmut4 Cosmo workspace navigation. Defines the starting point for project and asset browsing
    baseBreadcrumb: ""
    # -- Destination path mapping for Helmut4 Cosmo integration. Maps Vulcano asset locations to Cosmo workspace structure
    mappingDest: ""
    # -- Source path mapping for Helmut4 Cosmo integration. Maps Cosmo workspace paths to Vulcano internal structure
    mappingSrc: ""
    # -- Enable synchronization between Vulcano assets and Helmut4 Cosmo workspace. Keeps asset metadata and status in sync
    sync: "false"

# Vidispine API Configuration
vidispine:
  enabled: false
  # -- Base URL for Vidispine media asset management system API
  baseUrl: ""
  # -- Authentication endpoint URL for Vidispine system
  baseUrlAuth: ""
  # -- Default workflow identifier in Vidispine for processing uploaded assets
  workflow: ""
  # -- Version number of the default Vidispine workflow to use
  workflowVersion: ""
  # -- Specific workflow identifier for MOGRT files in Vidispine
  workflowMogrt: ""
  # -- Version number of the MOGRT-specific workflow in Vidispine
  workflowVersionMogrt: ""
  # -- OAuth client identifier for Vidispine API authentication
  clientId: ""
  # -- OAuth client secret for secure Vidispine API authentication
  clientSecret: ""
  # -- Vidispine storage identifier for file operations
  storage: ""
  # -- URL for retrieving allowed values for the Location metadata field from Vidispine
  locationValuesUrl: ""
  # -- Default location value to be pre-selected in the location selector
  defaultLocation: ""

# VDB Configuration
vdb:
  # -- Server hostname or URL for the NDR VDB system
  server: ""
  # -- Enable simulation mode for VDB operations without making actual network calls
  simulate: "true"

# NDR Configuration
ndr:
  # -- Wildcard BID pattern used for broadcast ID matching in the NDR VDB system
  wildcardBid: "xxxxx"
  # -- URL to the NDR VDB documentation wiki
  wikiUrl:
  # -- URL endpoint for looking up BID (Broadcast ID) information in the NDR VDB system
  bidLookupUrl:

# Octopus Configuration
octopus:
  # -- Enable Octopus newsroom system integration for receiving MOS messages
  enabled: false
  # -- API endpoint URL for Octopus newsroom system integration
  api: ""
  # -- Password for authenticating with the Octopus newsroom system
  password: ""
  # -- Enable the Octopus client for receiving and processing MOS messages
  startClient: "false"
  # -- Username for authenticating with the Octopus newsroom system
  username: ""
  client:
    # -- Delay in milliseconds between Octopus client polling requests
    delayInMS: "1000"

# Adobe Libraries API Configuration
adobe:
  # -- Enable Adobe Creative Cloud Libraries integration for syncing MOGRT templates
  enabled: false
  # -- OAuth access token for Adobe Creative Cloud Libraries API authentication
  clientToken: ""
  # -- Adobe IMS Client ID for OAuth authentication flow
  clientId: ""
  # -- Adobe IMS Client Secret for OAuth authentication
  secret: ""
  # -- Enable automatic synchronization of Adobe Creative Cloud Libraries every 2 minutes
  scan: "false"
  # -- File path where a JSON dump of all available Adobe CC Libraries elements will be created
  dumpFilepath: ""
  # -- Adobe API Key for accessing Adobe Creative Cloud services
  apiKey: "CCHomeWeb1"
  # -- Comma-separated list of Adobe Creative Cloud Library names that should be excluded from synchronization
  librariesIgnore: '"Library to Ignore"'

# Project Configuration
project:
  # -- URLs to send project data to external systems
  sendToUrls: ""
  delete:
    # -- Only allow project deletion by the owner
    ownerOnly: "true"

# Authentication Configuration
auth:
  # -- Authentication mode (MICROSOFT, KEYCLOAK, etc.)
  mode: "MICROSOFT"
  microsoft:
    # -- Microsoft Azure AD authority URL
    authority:
    # -- Microsoft Azure AD client ID
    clientId:
  # -- Service admin password for authentication
  serviceAdminPassword:
  keycloak:
    # -- Keycloak authority URL
    authority:
    # -- Keycloak client ID
    clientId:
    # -- Keycloak client secret
    clientSecret:
  # -- Authentication secret key
  secret:

# Admin Users
# -- List of email addresses for users with administrative privileges. One email per line. These users will have full system access including project deletion and user management.
adminUsers: |
  admin1@domain.com
  admin2@domain.com

# Tomcat Configuration
tomcat:
  multipart:
    # -- Maximum file size for multipart uploads
    maxFileSize: "1000MB"
    # -- Maximum request size for multipart uploads
    maxRequestSize: "1000MB"

# Network Configuration
# -- Node selector for pod scheduling
nodeSelector: {}
# -- Tolerations for pod scheduling on tainted nodes
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}

# -- Extra Kubernetes objects to deploy alongside the chart.
# Useful for BitwardenSecrets, custom PVCs, StorageClasses, or any other resource.
# Supports templating via tpl – you can reference .Release.Name, .Values, etc.
# Example (Bitwarden Secrets Manager):
# extraObjects:
#   - apiVersion: k8s.bitwarden.com/v1
#     kind: BitwardenSecret
#     metadata:
#       name: rabbitmq
#       namespace: "{{ .Release.Namespace }}"
#     spec:
#       organizationId: "<org-id>"
#       secretName: bw-rabbitmq-secrets
#       map:
#         - bwSecretId: <uuid>
#           secretKeyName: "rabbitmq-password"
#         - bwSecretId: <uuid>
#           secretKeyName: "rabbitmq-erlang-cookie"
#       authToken:
#         secretName: bw-auth-token
#         secretKey: token
extraObjects: []

# Data Feed Mapping Configuration
dataFeedMapping:
  # -- Skip Asset Creation for Updates from Datafeed
  skipUpdates: "false"
  # -- Ignore Delete Messages from Datafeed
  ignoreDelete: "false"

# ConfigMap and Secret Configuration
config:
  # -- Labels for all resources
  labels:
    app: "vulcano"
    version: "1.9.13"
