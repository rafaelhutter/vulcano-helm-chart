apiVersion: v2
name: vulcano
description: Vulcano - Complete application deployment with MongoDB, RabbitMQ, and optional CSI driver
type: application
version: 1.1.0
appVersion: "1.9.13"
home: https://github.com/rafaelhutter/vulcano-helm-chart
sources:
  - https://github.com/rafaelhutter/vulcano-helm-chart
maintainers:
  - name: Moovit
    email: support@moovit.de

dependencies:
  - name: mongodb
    alias: mongodb
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.10.3
    condition: mongodb.enabled
  - name: rabbitmq
    alias: rabbitmq
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.2.12
    condition: rabbitmq.enabled
