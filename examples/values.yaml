# ============================================================
#  Vulcano Helm Chart - Customer Values
#  Fill in all fields marked with "# <- REQUIRED"
#  then run install.sh to deploy.
# ============================================================

# -- Override the chart name (defaults to chart name)
# nameOverride: ""
# -- Override the full release name (defaults to release name + chart name)
# fullnameOverride: ""

# -----------------------------------------------------------
# 1. GLOBAL CONFIGURATION
# -----------------------------------------------------------
global:
  namespace: "vulcano-app" # <- REQUIRED: Kubernetes namespace
  domain: "vulcano.example.com" # <- REQUIRED: Your domain

# -----------------------------------------------------------
# 2. DOCKER IMAGE (credentials provided by Moovit)
# -----------------------------------------------------------
images:
  vulcano:
    repository: "moovit/vulcano"
    tag: "1.9.13"
    pullPolicy: "IfNotPresent"
  # filetransfer:
  #   repository: "moovit/vulcano-filetransfer"
  #   tag: "0.0.10"
  #   pullPolicy: "IfNotPresent"
  # dflconnector:
  #   repository: "moovit/vulcano-dfl-connector"
  #   tag: "0.2.20"
  #   pullPolicy: "IfNotPresent"

imagePullSecrets:
  enabled: true
  dockerUsername: "moovit" # provided by Moovit
  dockerPassword: "DOCKER_PAT" # <- REQUIRED: Docker access token (provided by Moovit)
  dockerEmail: "support@moovit.de"
  dockerServer: "https://index.docker.io/v1/"

# -----------------------------------------------------------
# 3. VULCANO APPLICATION
# -----------------------------------------------------------
vulcano:
  enabled: true
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8889
    targetPort: 8889

  # -- Ingress / TLS
  ingress:
    enabled: true
    className: nginx
    hosts:
      - "vulcano.example.com" # <- REQUIRED: same as global.domain
    path: "/"
    tls:
      enabled: true
      source: "letsencrypt" # Options: letsencrypt | existing
      letsencrypt:
        enabled: true
        clusterIssuer: "letsencrypt-prod"
        email: "admin@example.com" # <- REQUIRED: email for Let's Encrypt notifications
      # Alternative - use an existing certificate:
      # source: "existing"
      # existing:
      #   secretName: "tls-vulcano-cert"

  # -- Resource limits
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "2Gi"

  # -- Health checks (disabled by default)
  livenessProbe:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Persistent storage
  storage:
    mountPath: "/data"
    pvc: "smb-vulcano-data"
    size: "50Gi"
    accessModes: "ReadWriteMany"
    storageClass: "" # storage class for the PVC (e.g. "longhorn", "sp-tanzu2025-sms")
    labels: {}
    # Annotations for the PVC - useful to prevent accidental deletion:
    annotations: {}
    #   helm.sh/resource-policy: keep
    # -- Use an existing PVC instead of creating a new one (e.g. from extraObjects or pre-provisioned):
    # existingClaim: "my-existing-pvc"

  # -- License key (provided by Moovit)
  license:
    key: "" # <- REQUIRED: license key provided by Moovit

  # -- Application behaviour (optional overrides)
  # subtitle: ""                    # custom subtitle shown in the web interface header
  # allowDownload: "true"           # enable download of rendered assets
  # allowDuplicates: "true"         # allow assets with duplicate names
  # allowLinebreaksByDefault: "false"
  # autologout:
  #   disable: "false"
  #   hours: "1"                    # hours of inactivity before auto-logout
  # completedAssetInterceptor: ""   # HTTP endpoint that receives and can modify completed asset data
  # completedWebhook: ""            # HTTP webhook for notification only (cannot modify data)
  # createAssetInterceptor: ""      # HTTP endpoint called when a new asset is created
  # folder:
  #   createUserFolder: "false"
  #   globalParent: ""
  # frontend:
  #   enableTimecodeForAssets: "false"
  # maxPropertiesInNames: "5"       # max number of template properties used in auto-generated asset names
  # maxPropertyLength: "10"         # max character length per property value in asset names
  # output:
  #   namePattern: ""               # template pattern for auto-generated output file names
  # panel:
  #   loginRequired: "true"         # require login for Adobe Premiere Pro panel
  # searchProjectOnPageOpen: "true" # auto-load projects on main page open
  # showAllBins: "false"            # show all bins or only bins with content
  # useCustomFileName: "false"      # allow users to specify custom filenames
  # webconfig:
  #   disable: "false"              # disable the web-based configuration interface
  # projects:
  #   sortBy: "NAME"                # sorting criteria for project lists (NAME, CREATED, UPDATED)
  # home:
  #   base: "/home"                 # base path for user home directories
  # media:
  #   dockerHighresPath: ""         # internal Docker path override for high-resolution media

# -----------------------------------------------------------
# 4. AUTHENTICATION
# -----------------------------------------------------------
auth:
  mode: "MICROSOFT" # Options: MICROSOFT | KEYCLOAK
  microsoft:
    authority: "https://login.microsoftonline.com/TENANT_ID" # <- REQUIRED: replace TENANT_ID
    clientId: "APP_CLIENT_ID" # <- REQUIRED: Azure App Client ID
  # serviceAdminPassword: ""        # optional service admin password

  # Alternative - Keycloak:
  # mode: "KEYCLOAK"
  # keycloak:
  #   authority: "https://keycloak.example.com/realms/vulcano"
  #   clientId: "vulcano"
  #   clientSecret: "SECRET"

# -----------------------------------------------------------
# 5. ADMIN USERS
# -----------------------------------------------------------
adminUsers: |
  admin@example.com                 # <- REQUIRED: admin email addresses, one per line

# -----------------------------------------------------------
# 6. MONGODB
# -----------------------------------------------------------
mongodb:
  enabled: true
  fullnameOverride: "mongodb"
  replicaCount: 3 # set to 1 for single-node / dev environments
  auth:
    rootUsername: "admin"
    rootPassword: "CHANGE_ME" # <- REQUIRED: use a strong password
    # -- Alternative: reference an existing Kubernetes Secret instead of providing credentials here.
    # When set, rootPassword above is ignored and no mongodb-credentials Secret is created by this chart.
    # existingSecret: "bw-mongodb-secrets"
    # existingSecretPasswordKey: "mongodb-root-password"  # key inside existingSecret (chart default)
  persistence:
    enabled: true
    size: "20Gi"
    storageClassName: "" # set if required (e.g. "local-path")

  metrics:
    enabled: false

# -----------------------------------------------------------
# 7. RABBITMQ
# -----------------------------------------------------------
rabbitmq:
  enabled: true
  fullnameOverride: "rabbitmq"
  replicaCount: 1 # set to 3 for HA
  auth:
    erlangCookie: "RANDOM_LONG_STRING" # <- REQUIRED: generate a random string
    username: "vulcano"
    password: "CHANGE_ME" # <- REQUIRED: use a strong password
    # -- Alternative: reference an existing Kubernetes Secret instead of providing credentials here.
    # When set, password and erlangCookie above are ignored and no rabbitmq-credentials Secret is created.
    # IMPORTANT: existingPasswordKey and existingErlangCookieKey must exactly match the key names
    # inside the external Secret – they must also match the secretKeyName entries in extraObjects
    # (e.g. Bitwarden). A mismatch causes: "couldn't find key <key> in Secret <name>"
    # existingSecret: "bw-rabbitmq-secrets"
    # existingPasswordKey: "password"          # must match secretKeyName in extraObjects
    # existingErlangCookieKey: "erlang-cookie" # must match secretKeyName in extraObjects
  service:
    type: ClusterIP
  persistence:
    enabled: false
  metrics:
    enabled: false

# -----------------------------------------------------------
# 8. SMB STORAGE (optional - comment out if not needed)
# -----------------------------------------------------------
smbCsi:
  enabled: true
  uri: "//192.168.1.100/share/vulcano" # <- REQUIRED: your NAS/SMB share path
  username: "smb-user" # <- REQUIRED
  password: "smb-password" # <- REQUIRED

# -----------------------------------------------------------
# 9. FOLDER CONFIGURATION
# -----------------------------------------------------------
folders:
  pathMapRenderNode: "Z:"
  pathMapServer: "/data"
  # -- Name of a K8s Secret whose keys are mounted as certificate files into /etc/certs
  customCertificatesSecret: ""
  templates: "/data/templates"
  media:
    folder: "/data/highres"
    extension: ".mov"
    clientFolder: "/data/highres"
    templatesFolder: "/data/highres_templates"
  output:
    deletedFolder: "/data/highres_deleted"
  proxy: "/data/lowres"
  thumbnails: "/data/thumbs"
  # templatesClient: ""             # client-side path mapping for template files

# -----------------------------------------------------------
# 10. FOLDER SCANNER
# -----------------------------------------------------------
folderScanner:
  startWatcher: "true" # monitor file system for template changes
  maxDepth: "10"
  allowEmptyFolder: "true"
  recreateMissingHighres: "true"
  defaultBin: "Templates"
  # startD3: "false"                # enable Delta Tre sports data integration

# -----------------------------------------------------------
# 11. FEATURES (optional overrides)
# -----------------------------------------------------------
features:
  afxRender: "true"
  afxCreateMogrt: "true"
  afxRenderPreview: "true"
  afxRenderMassJobLimit: "-1" # -1 = unlimited
  afxRenderOnDemand: "false"
  cloudmode: "false"
  ignoreMogrt: "false"
  maxNameLength: "200"
  logThirdPartyRequests: "false"
  # afxRenderOnDemandExtended: "false"

# -----------------------------------------------------------
# 12. LOGGING
# -----------------------------------------------------------
logging:
  fileName: "/data/logs/vulcano_k8s.log"
  fileMaxSize: "10MB"
  level:
    org: "INFO"
    # securityFilter: "WARN"

# -----------------------------------------------------------
# 13. HOUSEKEEPING (optional)
# -----------------------------------------------------------
housekeeping:
  enabled: "false"
  maxAge: "14" # max age in days before automatic cleanup

