# -----------------------------------------------------------
# EXTRA OBJECTS (optional)
# -----------------------------------------------------------
# Deploy arbitrary Kubernetes objects alongside this chart.
# Supports Helm templating ({{ .Release.Namespace }}, {{ .Values.global.namespace }}, etc.).
# Useful for: Bitwarden/External Secrets, custom PVCs with special storage classes, etc.
#
# Example – Bitwarden Secrets Manager (provides secrets to RabbitMQ + MongoDB):
# extraObjects:
#   - apiVersion: k8s.bitwarden.com/v1
#     kind: BitwardenSecret
#     metadata:
#       name: rabbitmq
#       namespace: "{{ .Values.global.namespace }}"
#     spec:
#       organizationId: "0b83b58f-0657-4d2d-8e38-b2ea00d406bb"
#       secretName: bw-rabbitmq-secrets
#       map:
#         - bwSecretId: ce01340a-aba4-4fe9-bf39-b3df00f33a31
#           secretKeyName: "bw-rabbitmq-password"
#         - bwSecretId: 3e04d72c-f623-424f-8828-b3df00f35493
#           secretKeyName: "bw-rabbitmq-erlang-cookie"
#       authToken:
#         secretName: bw-auth-token
#         secretKey: token
#
# Example – custom PVC (e.g. CSI SMB) that Vulcano mounts via existingClaim:
# extraObjects:
#   - apiVersion: v1
#     kind: PersistentVolumeClaim
#     metadata:
#       name: vulcano-data-smb
#       namespace: "{{ .Values.global.namespace }}"
#       annotations:
#         helm.sh/resource-policy: keep
#     spec:
#       accessModes:
#         - ReadWriteMany
#       storageClassName: "sp-tanzu2025-sms"
#       resources:
#         requests:
#           storage: 8Gi
# # reference above PVC in vulcano.storage:
# # vulcano:
# #   storage:
# #     existingClaim: "vulcano-data-smb"
extraObjects: []

# -----------------------------------------------------------
# RBAC & SECURITY (defaults - do not change unless required)
# -----------------------------------------------------------
rbac:
  create: true

serviceAccount:
  create: true
  name: vulcano

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# -----------------------------------------------------------
# NETWORK (optional)
# -----------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------
# TOMCAT UPLOAD LIMITS
# -----------------------------------------------------------
tomcat:
  multipart:
    maxFileSize: "1000MB"
    maxRequestSize: "1000MB"
