# -----------------------------------------------------------
# RBAC & SECURITY (defaults - do not change unless required)
# -----------------------------------------------------------
rbac:
  create: true

serviceAccount:
  create: true
  name: vulcano

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

podSecurityPolicy:
  enabled: false

# -----------------------------------------------------------
# NETWORK (optional)
# -----------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------
# TOMCAT UPLOAD LIMITS
# -----------------------------------------------------------
tomcat:
  multipart:
    maxFileSize: "1000MB"
    maxRequestSize: "1000MB"
